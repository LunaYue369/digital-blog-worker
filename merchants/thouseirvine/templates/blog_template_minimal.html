<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — {{STORE_NAME}}</title>
    <meta name="description" content="{{EXCERPT}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{EXCERPT}}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="{{STORE_NAME}}">
    <meta property="og:url" content="{{CANONICAL_URL}}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ── JSON-LD Structured Data ────────────────────── -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{TITLE}}",
        "description": "{{EXCERPT}}",
        "author": {
            "@type": "Organization",
            "name": "{{STORE_NAME}}",
            "url": "{{WEBSITE}}"
        },
        "publisher": {
            "@type": "Organization",
            "name": "{{STORE_NAME}}",
            "url": "{{WEBSITE}}"
        },
        "datePublished": "{{DATE_ISO}}",
        "dateModified": "{{DATE_ISO}}",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "{{CANONICAL_URL}}"
        }
    }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{WEBSITE}}" },
            { "@type": "ListItem", "position": 2, "name": "Blog", "item": "{{WEBSITE}}blog/" },
            { "@type": "ListItem", "position": 3, "name": "{{TITLE}}" }
        ]
    }
    </script>

    <style>
        /* ── CSS Reset + Base — 极简渐变模板（白色主题） ──── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: {{PRIMARY_COLOR}};
            --accent: {{ACCENT_COLOR}};
            --accent-glow: {{ACCENT_COLOR}}15;
            --bg: #ffffff;
            --bg-card: #f5f5f7;
            --bg-elevated: #eeeef2;
            --text: #1a1a2e;
            --text-muted: #555566;
            --text-dim: #999aab;
            --border: rgba(0,0,0,0.06);
            --radius: 20px;
            --max-w: 760px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            font-size: 17px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Hero — 极简：全宽图 + 渐变叠加 + 居中标题 ──── */
        .hero {
            position: relative;
            width: 100%;
            min-height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: url("{{HERO_IMAGE}}");
            background-size: cover;
            background-position: center;
            filter: brightness(0.5) saturate(0.8);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 80%, var(--accent-glow), transparent 60%),
                linear-gradient(to top, var(--bg), transparent 50%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 640px;
            padding: 80px 24px;
        }

        .hero-pill {
            display: inline-block;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            color: var(--accent);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .hero h1 {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            line-height: 1.2;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .hero-excerpt {
            margin-top: 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.7;
        }

        /* ── Article Meta Bar ─────────────────────────── */
        .article-meta {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        .article-meta span { display: inline-flex; align-items: center; gap: 6px; }

        /* ── Table of Contents ─────────────────────────── */
        .toc {
            max-width: var(--max-w);
            margin: 28px auto 0;
            padding: 24px 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .toc-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .toc ol { list-style: decimal; padding-left: 20px; margin: 0; }
        .toc li { margin-bottom: 6px; font-size: 0.92rem; color: var(--text-muted); }
        .toc a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .toc a:hover { color: var(--accent); }

        /* ── Article Body ─────────────────────────────── */
        .article-wrapper {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
        }

        .article-body { padding: 56px 0 80px; }

        .article-body h2 {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 1.65rem;
            font-weight: 400;
            color: var(--text);
            margin: 52px 0 20px;
            scroll-margin-top: 24px;
        }

        .article-body h3 { font-size: 1.15rem; font-weight: 600; color: var(--accent); margin: 36px 0 14px; }
        .article-body p { margin-bottom: 20px; color: var(--text-muted); font-size: 1.05rem; }
        .article-body a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
        .article-body a:hover { opacity: 0.8; }
        .article-body strong { color: var(--text); font-weight: 600; }
        .article-body ul, .article-body ol { margin: 16px 0 24px 24px; color: var(--text-muted); }
        .article-body li { margin-bottom: 10px; padding-left: 4px; }
        .article-body li::marker { color: var(--accent); }

        .article-body blockquote {
            border: none;
            background: linear-gradient(90deg, var(--accent-glow) 0%, transparent 100%);
            padding: 24px 28px;
            margin: 32px 0;
            border-radius: var(--radius);
            font-style: italic;
            color: var(--text);
            font-size: 1.1rem;
        }

        .article-body hr { border: none; height: 1px; background: var(--border); margin: 48px auto; max-width: 120px; }

        .article-body table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 28px 0; font-size: 0.95rem; border-radius: var(--radius); overflow: hidden; }
        .article-body th { background: var(--bg-elevated); color: var(--accent); font-weight: 600; text-align: left; padding: 14px 18px; border-bottom: 1px solid var(--border); }
        .article-body td { padding: 12px 18px; border-bottom: 1px solid var(--border); color: var(--text-muted); background: var(--bg-card); }
        .article-body tr:last-child td { border-bottom: none; }
        .article-body tr:hover td { background: var(--bg-elevated); }

        /* ── Images ───────────────────────────────────── */
        .blog-image { margin: 40px 0; border-radius: var(--radius); overflow: hidden; box-shadow: 0 12px 48px rgba(0,0,0,0.08); }
        .blog-image img { width: 100%; display: block; transition: transform 0.6s ease; }
        .blog-image:hover img { transform: scale(1.015); }

        /* ── Highlight / Callout ──────────────────────── */
        .blog-highlight {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin: 36px 0;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .blog-highlight::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), transparent); }
        .blog-highlight::after { content: "HIGHLIGHT"; display: block; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 12px; order: -1; }

        /* ── FAQ Section ──────────────────────────────── */
        .faq-section {
            margin: 48px 0 32px;
            padding-top: 32px;
            border-top: 2px solid var(--border);
        }

        .faq-section h2 {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 1.65rem;
            margin-bottom: 24px;
        }

        .faq-item {
            margin-bottom: 24px;
            padding: 20px 24px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .faq-item h3 { font-size: 1.1rem; font-weight: 600; color: var(--text); margin: 0 0 10px; }
        .faq-item p { margin: 0; color: var(--text-muted); font-size: 1rem; }

        /* ── CTA Section ──────────────────────────────── */
        .blog-cta {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 56px 36px;
            margin: 48px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .blog-cta::before { content: ""; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: var(--accent); opacity: 0.04; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .blog-cta h3 { font-family: 'Inter', system-ui, sans-serif; font-size: 1.6rem; color: var(--text); margin-bottom: 12px; position: relative; }
        .blog-cta p { color: var(--text-muted); margin-bottom: 28px; position: relative; }

        .cta-button {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--accent); color: #fff;
            font-weight: 700; font-size: 0.95rem; padding: 16px 40px;
            border-radius: 100px; text-decoration: none; position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px var(--accent-glow);
        }

        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--accent-glow); }

        /* ── Tags ─────────────────────────────────────── */
        .tags-section { display: flex; flex-wrap: wrap; gap: 8px; padding: 32px 0; border-top: 1px solid var(--border); margin-top: 48px; }
        .tag { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-dim); font-size: 0.78rem; font-weight: 500; padding: 6px 16px; border-radius: 100px; transition: all 0.2s; }
        .tag:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

        /* ── Footer ───────────────────────────────────── */
        .site-footer { text-align: center; padding: 32px 24px 48px; color: var(--text-dim); font-size: 0.85rem; }
        .site-footer a { color: var(--accent); text-decoration: none; }

        /* ── Blog Section Cards ──────────────────────── */
        .blog-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin: 24px 0; transition: transform 0.2s, border-color 0.3s; }
        .blog-section:hover { border-color: rgba(0,0,0,0.12); transform: translateY(-2px); }

        /* ── Scroll Animations ────────────────────────── */
        .fade-up { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 768px) {
            .hero { min-height: 380px; }
            .hero h1 { font-size: 1.8rem; }
            .hero-content { padding: 60px 20px; }
            .article-meta { flex-wrap: wrap; gap: 12px; padding: 16px 20px; }
            .toc { margin: 20px 16px 0; }
            .article-body { padding: 36px 0 60px; }
            .blog-cta { padding: 40px 24px; }
        }

        /* ── Scrollbar ────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>

    <!-- ── Hero — 极简居中 ─────────────────────────────── -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-pill">{{STORE_NAME}}</div>
            <h1>{{TITLE}}</h1>
            <p class="hero-excerpt">{{EXCERPT}}</p>
        </div>
    </section>

    <!-- ── Article Meta ────────────────────────────────── -->
    <div class="article-meta">
        <span>✍ {{STORE_NAME}}</span>
        <span><time datetime="{{DATE_ISO}}">{{DATE_DISPLAY}}</time></span>
        <span>{{READING_TIME}} min read</span>
    </div>

    <!-- ── Table of Contents (auto-generated by JS) ────── -->
    <nav class="toc" id="toc" aria-label="Table of Contents"></nav>

    <!-- ── Article Body ────────────────────────────────── -->
    <div class="article-wrapper">
        <article class="article-body">
            {{CONTENT}}

            <!-- ── Tags ────────────────────────────────── -->
            <div class="tags-section">
                {{TAGS}}
            </div>
        </article>
    </div>

    <!-- ── Footer ──────────────────────────────────────── -->
    <footer class="site-footer">
        <p>&copy; 2026 <a href="{{WEBSITE}}" target="_blank">{{STORE_NAME}}</a> &mdash; All rights reserved.</p>
    </footer>

    <!-- ── Scripts ─────────────────────────────────────── -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ── Auto-generate Table of Contents from H2 headings ──
            const headings = document.querySelectorAll('.article-body h2');
            const tocNav = document.getElementById('toc');
            if (headings.length > 1 && tocNav) {
                let html = '<div class="toc-title">In This Article</div><ol>';
                headings.forEach((h, i) => {
                    const id = 'section-' + (i + 1);
                    h.setAttribute('id', id);
                    html += `<li><a href="#${id}">${h.textContent}</a></li>`;
                });
                html += '</ol>';
                tocNav.innerHTML = html;
            } else if (tocNav) {
                tocNav.style.display = 'none';
            }

            // ── Scroll fade-up animations ──
            const targets = document.querySelectorAll(
                '.article-body h2, .article-body h3, .blog-image, .blog-highlight, .blog-cta, .blog-section, .article-body blockquote, .faq-item'
            );
            targets.forEach(el => el.classList.add('fade-up'));

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

            targets.forEach(el => observer.observe(el));
        });
    </script>

</body>
</html>
