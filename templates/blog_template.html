<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — {{STORE_NAME}}</title>
    <meta name="description" content="{{EXCERPT}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{EXCERPT}}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="{{STORE_NAME}}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        /* ── CSS Reset + Base ─────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: {{PRIMARY_COLOR}};
            --accent: {{ACCENT_COLOR}};
            --accent-glow: {{ACCENT_COLOR}}33;
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --bg-glass: rgba(255,255,255,0.04);
            --text: #e8e8ed;
            --text-muted: #8888a0;
            --text-dim: #555570;
            --border: rgba(255,255,255,0.08);
            --radius: 16px;
            --max-w: 780px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            font-size: 17px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Hero Section ─────────────────────────────── */
        .hero {
            position: relative;
            width: 100%;
            min-height: 520px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: url("{{HERO_IMAGE}}");
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
            transition: transform 0.6s ease;
        }

        .hero:hover .hero-bg { transform: scale(1.03); }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to top,
                var(--bg) 0%,
                rgba(10,10,15,0.85) 30%,
                rgba(10,10,15,0.3) 60%,
                transparent 100%
            );
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 60px 24px 48px;
            width: 100%;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            line-height: 1.15;
            color: #fff;
            max-width: 700px;
            text-shadow: 0 2px 30px rgba(0,0,0,0.5);
        }

        .hero-excerpt {
            margin-top: 18px;
            font-size: 1.05rem;
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            line-height: 1.6;
        }

        /* ── Article Body ─────────────────────────────── */
        .article-wrapper {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
        }

        .article-body {
            padding: 48px 0 80px;
        }

        .article-body h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin: 48px 0 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }

        .article-body h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
            margin: 36px 0 14px;
        }

        .article-body p {
            margin-bottom: 18px;
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .article-body a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .article-body a:hover { border-bottom-color: var(--accent); }

        .article-body strong { color: var(--text); font-weight: 600; }

        .article-body ul, .article-body ol {
            margin: 16px 0 24px 24px;
            color: var(--text-muted);
        }

        .article-body li {
            margin-bottom: 10px;
            padding-left: 4px;
        }

        .article-body li::marker { color: var(--accent); }

        .article-body blockquote {
            border-left: 3px solid var(--accent);
            background: var(--bg-glass);
            padding: 20px 24px;
            margin: 28px 0;
            border-radius: 0 var(--radius) var(--radius) 0;
            font-style: italic;
            color: var(--text);
        }

        .article-body hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin: 48px 0;
        }

        .article-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 0.95rem;
        }

        .article-body th {
            background: var(--bg-glass);
            color: var(--text);
            font-weight: 600;
            text-align: left;
            padding: 14px 16px;
            border-bottom: 2px solid var(--accent);
        }

        .article-body td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        .article-body tr:hover td { background: var(--bg-glass); }

        /* ── Images in Article ────────────────────────── */
        .blog-image {
            margin: 36px 0;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .blog-image img {
            width: 100%;
            display: block;
            transition: transform 0.5s ease;
        }

        .blog-image:hover img { transform: scale(1.02); }

        /* ── Highlight / Callout Box ──────────────────── */
        .blog-highlight {
            background: linear-gradient(135deg, var(--bg-glass), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 28px;
            margin: 32px 0;
            backdrop-filter: blur(12px);
        }

        .blog-highlight::before {
            content: "KEY TAKEAWAY";
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 12px;
        }

        /* ── CTA Section ──────────────────────────────── */
        .blog-cta {
            background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--accent), var(--primary) 60%));
            border-radius: var(--radius);
            padding: 48px 36px;
            margin: 48px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .blog-cta::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 50%, var(--accent-glow), transparent 70%);
            opacity: 0.5;
        }

        .blog-cta h3 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 12px;
            position: relative;
        }

        .blog-cta p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 24px;
            position: relative;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            color: var(--primary);
            font-weight: 700;
            font-size: 1rem;
            padding: 14px 36px;
            border-radius: 100px;
            text-decoration: none;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* ── Tags ─────────────────────────────────────── */
        .tags-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 32px 0;
            border-top: 1px solid var(--border);
            margin-top: 48px;
        }

        .tag {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 100px;
            transition: border-color 0.2s, color 0.2s;
        }

        .tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Footer ───────────────────────────────────── */
        .site-footer {
            text-align: center;
            padding: 32px 24px 48px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        .site-footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ── Scroll Animations ────────────────────────── */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 768px) {
            .hero { min-height: 400px; }
            .hero h1 { font-size: 1.8rem; }
            .hero-content { padding: 40px 20px 32px; }
            .article-body { padding: 32px 0 60px; }
            .article-body h2 { font-size: 1.4rem; }
            .blog-cta { padding: 36px 24px; }
            .blog-highlight { padding: 20px; }
        }

        /* ── Scrollbar ────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── Blog Section Cards ────────────────────────── */
        .blog-section {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin: 24px 0;
            transition: border-color 0.3s;
        }

        .blog-section:hover { border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body>

    <!-- ── Hero Banner ─────────────────────────────────── -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badge">{{STORE_NAME}} Blog</div>
            <h1>{{TITLE}}</h1>
            <p class="hero-excerpt">{{EXCERPT}}</p>
        </div>
    </section>

    <!-- ── Article Body ────────────────────────────────── -->
    <div class="article-wrapper">
        <article class="article-body">
            {{CONTENT}}

            <!-- ── Tags ────────────────────────────────── -->
            <div class="tags-section">
                {{TAGS}}
            </div>
        </article>
    </div>

    <!-- ── Footer ──────────────────────────────────────── -->
    <footer class="site-footer">
        <p>&copy; 2026 <a href="{{WEBSITE}}" target="_blank">{{STORE_NAME}}</a> &mdash; All rights reserved.</p>
    </footer>

    <!-- ── Scroll Animation Script ─────────────────────── -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 为所有主要元素添加滚动渐入动画
            const targets = document.querySelectorAll(
                '.article-body h2, .article-body h3, .blog-image, .blog-highlight, .blog-cta, .blog-section, .article-body blockquote'
            );
            targets.forEach(el => el.classList.add('fade-up'));

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

            targets.forEach(el => observer.observe(el));
        });
    </script>

</body>
</html>
